name: Daily Scrape & Yomitan Release

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push commits and create releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: |
          python scrape.py

      - name: Check for changes
        id: git-check
        run: |
          git add moves_*.json
          # If there are changes, git diff --staged will return exit code 1 (caught by the if statement)
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected. Skipping release."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New entries found! Proceeding with release."
          fi

      - name: Generate Yomitan Dictionary
        if: steps.git-check.outputs.changed == 'true'
        run: |
          python make_yomitan.py

      - name: Commit and Push Updated JSON
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "Automated daily update: Fetched latest special moves"
          git push

      - name: Get Date for Release Tag
        if: steps.git-check.outputs.changed == 'true'
        id: date
        run: echo "date=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        if: steps.git-check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ steps.date.outputs.date }}
          name: Hissatsu Waza Yomitan Dictionary - ${{ steps.date.outputs.date }}
          files: Hissatsu_Waza_Yomitan.zip
          body: |
            Automated daily update.
            New moves or descriptions were scraped from the source and added to the dictionary.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
